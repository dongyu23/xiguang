name: xiguang

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 64m
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${DOCKER_TARGETARCH:-arm64}
    expose:
      - "8080"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me_64_chars_minimum_for_real_deployments}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-720h}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-glimmer}
      DB_PASSWORD: ${DB_PASSWORD:-glimmer_dev_password}
      DB_NAME: ${DB_NAME:-glimmer}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-glimmer_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-glimmer_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-glimmer-media}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "/app/xiguang", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-glimmer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-glimmer_dev_password}
      POSTGRES_DB: ${DB_NAME:-glimmer}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-glimmer} -d ${DB_NAME:-glimmer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - log_min_duration_statement=200ms

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    mem_limit: 128m
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-glimmer_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-glimmer_minio_password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  redis_data:
