events {}

http {
  client_max_body_size 20m;
  include /etc/nginx/mime.types;

  upstream xiguang_api {
    server app:8080;
  }

  server {
    listen 80;

    location /healthz {
      proxy_pass http://xiguang_api/healthz;
    }

    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_pass http://xiguang_api;
    }

    location / {
      return 301 https://$host:8443$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/certs/xiguang-lan.crt;
    ssl_certificate_key /etc/nginx/certs/xiguang-lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    location /healthz {
      proxy_pass http://xiguang_api/healthz;
    }

    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_pass http://xiguang_api;
    }

    location /media/ {
      proxy_pass http://minio:9000/glimmer-media/;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|m4a|wasm)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      try_files $uri =404;
    }
  }
}
