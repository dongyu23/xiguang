<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Glimmer - 私人多媒体意识流记录工具">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="隙光">
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="assets/assets/fonts/PingFangShiGuangTi.ttf" as="font" type="font/ttf" crossorigin="anonymous">
  <title>隙光</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #142322;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #native-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #fbf7ef;
      opacity: 1;
      transition: opacity 260ms ease;
      pointer-events: none;
    }

    #native-splash.is-hidden {
      opacity: 0;
    }

    #native-splash::before {
      position: absolute;
      inset: 0;
      content: "";
      background:
        radial-gradient(circle at 52% 42%, rgba(231, 220, 172, .52), transparent 28%),
        radial-gradient(circle at 42% 56%, rgba(127, 176, 164, .26), transparent 34%),
        repeating-linear-gradient(
          174deg,
          transparent 0 72px,
          rgba(63, 109, 96, .08) 73px,
          transparent 75px
        );
      animation: native-splash-wash 1500ms ease-out both;
    }

    #native-splash-card {
      position: relative;
      width: min(78vw, 42vh, 430px);
      min-width: 220px;
      aspect-ratio: 2 / 3;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 38px rgba(91, 74, 63, .12);
      animation: native-splash-card 1500ms cubic-bezier(.2, .8, .2, 1) both;
    }

    #native-splash-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    #native-splash-curtain {
      position: absolute;
      width: min(64vw, 54vh, 430px);
      min-width: 230px;
      transform: translate(-52%, -10%) scale(.98);
      opacity: .28;
      animation: native-splash-curtain 900ms ease-out both;
    }

    @keyframes native-splash-wash {
      0% {
        background-color: #090d0c;
      }
      100% {
        background-color: #fbf7ef;
      }
    }

    @keyframes native-splash-card {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(.94);
      }
      45%,
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes native-splash-curtain {
      0% {
        opacity: 0;
        transform: translate(-68%, -12%) scale(.96);
      }
      42% {
        opacity: .38;
      }
      100% {
        opacity: 0;
        transform: translate(-44%, -8%) scale(1.01);
      }
    }
  </style>
  <script>
    (function () {
      var hash = window.location.hash;
      if (!hash || hash.indexOf("#/") !== 0) return;
      var normalizedPath = hash.slice(1);
      window.history.replaceState(null, "", normalizedPath);
    })();
  </script>
</head>
<body>
  <div id="native-splash" aria-hidden="true">
    <img
      id="native-splash-curtain"
      src="assets/assets/picture/%25E7%25AA%2597%25E5%25B8%2598%25E8%2588%259E%25E5%258A%25A8.gif"
      alt=""
    >
    <div id="native-splash-card">
      <img src="assets/assets/picture/%25E6%2589%2593%25E5%25BC%2580%25E5%25B1%2595%25E7%25A4%25BA.png" alt="">
    </div>
  </div>
  <script>
    (function () {
      var hidden = false;
      function hideNativeSplash() {
        if (hidden) return;
        hidden = true;
        var splash = document.getElementById("native-splash");
        if (!splash) return;
        splash.classList.add("is-hidden");
        window.setTimeout(function () {
          splash.remove();
        }, 300);
      }

      window.addEventListener("flutter-first-frame", function () {
        window.setTimeout(hideNativeSplash, 120);
      });
      window.setTimeout(hideNativeSplash, 2600);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
