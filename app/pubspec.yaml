name: xiguang
description: 隙光 — 私人多媒体意识流记录工具。Flutter 前端。
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # 路由
  go_router: ^14.0.0

  # 本地数据库
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.0

  # 数据模型
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # 网络
  dio: ^5.4.0

  # 安全存储
  flutter_secure_storage: ^9.0.0

  # 图片
  image_picker: ^1.0.0
  flutter_image_compress: ^2.1.0

  # 录音
  record: ^7.0.0

  # 音频播放
  just_audio: ^0.9.0
  audio_session: ^0.1.0

  # 权限
  permission_handler: ^11.0.0

  # 崩溃上报
  sentry_flutter: ^9.21.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 代码生成
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  drift_dev: ^2.16.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/nav_icons/nav_gap.png
    - assets/nav_icons/nav_thread.png
    - assets/nav_icons/nav_island.png
    - assets/nav_icons/nav_mine.png
